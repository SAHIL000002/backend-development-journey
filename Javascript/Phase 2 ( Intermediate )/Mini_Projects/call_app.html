<!-- ================= POPUP FORM ================= -->

<div class="popup" id="popup">

    <div class="form-container">

        <h2>New Call</h2>

        <form id="callForm">

            <div class="input-box">
                <label>Image URL</label>
                <input id="imageUrl" required type="text" placeholder="https://example.com/image.jpg">
            </div>

            <div class="input-box">
                <label>Full Name</label>
                <input id="fullName" required type="text" placeholder="Enter full name">
            </div>

            <div class="input-box">
                <label>Home Town</label>
                <input id="homeTown" required type="text" placeholder="Enter home town">
            </div>

            <div class="input-box">
                <label>Purpose</label>
                <input id="purpose" required type="text" placeholder="Purpose of call">
            </div>

            <div class="input-box">

                <label>Category</label>

                <div class="category">

                    <label class="chip">
                        <input type="radio" name="category">
                        Emergency
                    </label>

                    <label class="chip">
                        <input type="radio" name="category">
                        Important
                    </label>

                    <label class="chip">
                        <input type="radio" name="category">
                        Urgent
                    </label>

                    <label class="chip">
                        <input type="radio" name="category">
                        No Rush
                    </label>

                </div>

            </div>

            <button type="submit" class="create-btn">
                Create Note
            </button>

            <button type="button" class="close-btn">
                Close
            </button>

        </form>

    </div>

</div>

<script src="call_app.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: "Gilroy";
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      #main {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background-color: #222;
      }
      #h1 {
        color: #555;
        font-size: 10rem;
      }

      .inpt {
        display: none;
      }

      #btn {
        padding: 12px 22px;
        background-color: red;
        color: white;
        font-weight: 600;
        border-radius: 30px;
      }

      #btn:hover {
        background-color: royalblue !important;
      }

      input {
        display: block;
      }

      #main2 {
        padding: 50px;
        width: 100%;
        height: 100%;
        background-color: #222;
      }

      .card {
        max-width: 300px;
        color: #fff;
        margin: 40px;
        padding: 20px;
        border: 2px solid #e3e3e3;
        display: inline-block;
        border-radius: 10px;
        border: 1px solid #555;
      }
      .card h4 {
        margin-top: 5px;
      }

      .profile {
        width: 50px;
        height: 50px;
        /* background-color: red; */
        border-radius: 50%;
        margin-bottom: 7px;
        overflow: hidden;
      }

      .profile img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
